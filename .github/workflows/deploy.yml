name: Build and Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: enricopiovesan.com/package-lock.json

      - name: Install dependencies
        working-directory: enricopiovesan.com
        run: npm ci

      - name: Build
        working-directory: enricopiovesan.com
        run: npm run build
        env:
          ELEVENTY_PATH_PREFIX: /enricopiovesan/

      - name: Commit docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "build: update docs [skip ci]"
          git push
