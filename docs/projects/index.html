  <h1>Projects</h1>
<p>Four open source projects. Each one addresses a real problem. Each one is production-grade — spec-governed, CI-enforced, properly licensed.</p>
<p><ep-project-card title="UMA-code-examples" type="Book companion" stack="Rust, WASM, HTML, JS" status="published" description="13 chapters of runnable code companion to the UMA book. 100% business logic coverage enforced in CI. Live reference app at universalmicroservices.com. Dual MIT/Apache licensed." github="https://github.com/enricopiovesan/UMA-code-examples" url="https://www.universalmicroservices.com"></ep-project-card></p>
<p><ep-project-card title="the-day-after-toolkit" type="CLI tool" stack="TypeScript" status="in progress" description="A CLI (cdad) that audits codebase agent-readiness and scaffolds the contracts needed to fix it. Six commands. OpenSpec-governed. Claude, Cursor, and Codex configs included." github="https://github.com/enricopiovesan/the-day-after-toolkit"></ep-project-card></p>
<p><ep-project-card title="Traverse" type="Runtime / research" stack="Rust 86%" status="pre-implementation" description="A contract-driven Rust/WASM runtime for discovering, validating, and composing portable business capabilities. Spec-governed. Foundation v0.1. Quality standards and ADR process in place." github="https://github.com/enricopiovesan/Traverse"></ep-project-card></p>
<p><ep-project-card title="youaskm3" type="Knowledge layer" stack="Rust/WASM, Web Components, PWA" status="in progress (M0)" description="A WASM-native MCP-powered personal knowledge layer. Runs entirely on GitHub Pages. No server, no database, no cost. Federation model so anyone can fork and run their own instance." github="https://github.com/youaskm3/youaskm3" url="https://youaskm3.com"></ep-project-card></p>
